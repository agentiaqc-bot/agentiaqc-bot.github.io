document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

play: swap;\n  src: url(\"c1aa2ed9-6368-4269-8514-89a40503615a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f2f2f3;\n  --color-surface: #e9e9ea;\n  --color-text: #1d1f20;\n  --color-accent: #5980a6;\n  --color-accent-2: #728fab;\n  --color-divider: color-mix(in srgb, #1d1f20 16%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f5f5f8;\n  --color-neutral-200: #e7e7ea;\n  --color-neutral-300: #d4d4d7;\n  --color-neutral-400: #b7b7ba;\n  --color-neutral-500: #98989b;\n  --color-neutral-600: #7a7a7d;\n  --color-neutral-700: #5d5d60;\n  --color-neutral-800: #424244;\n  --color-neutral-900: #2b2b2d;\n\n  --color-accent-100: #eef6ff;\n  --color-accent-200: #d6ebff;\n  --color-accent-300: #b5d9fd;\n  --color-accent-400: #94bce3;\n  --color-accent-500: #749dc4;\n  --color-accent-600: #597ea3;\n  --color-accent-700: #416180;\n  --color-accent-800: #2c455d;\n  --color-accent-900: #1d2d3d;\n\n  --color-accent-2-100: #eef6ff;\n  --color-accent-2-200: #d6ebff;\n  --color-accent-2-300: #bdd8f2;\n  --color-accent-2-400: #9ebbd8;\n  --color-accent-2-500: #7e9cb8;\n  --color-accent-2-600: #627d98;\n  --color-accent-2-700: #486077;\n  --color-accent-2-800: #314457;\n  --color-accent-2-900: #1f2d3a;\n\n  --font-heading: \"Barlow Condensed\", system-ui, sans-serif;\n  --font-heading-weight: 600;\n  --font-body: \"Barlow\", system-ui, sans-serif;\n\n  --space-1: 3.4px;\n  --space-2: 6.8px;\n  --space-3: 10.2px;\n  --space-4: 13.6px;\n  --space-6: 20.4px;\n  --space-8: 27.2px;\n\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 7px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2b2b2d 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2b2b2d 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2b2b2d 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.blueprint {\n  position: relative;\n  border: 1px solid var(--color-divider);\n  border-radius: 0;\n}\n/* The overlay image treatments (halftone, duotone) clip their overlay\n   (overflow:hidden); a blueprint wrapper draws its registration marks\n   outside the box, so when both classes share a wrapper the frame must\n   win. */\n.blueprint.halftone, .blueprint.plate, .blueprint.duotone { overflow: visible; }\n.blueprint > .corner {\n  position: absolute; width: 11px; height: 11px;\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.blueprint > .corner::before, .blueprint > .corner::after {\n  content: \"\"; position: absolute; background: currentColor;\n}\n.blueprint > .corner::before { left: 5px; top: 0; width: 1px; height: 100%; }\n.blueprint > .corner::after  { top: 5px; left: 0; width: 100%; height: 1px; }\n.blueprint > .corner.tl { top: -6px; left: -6px; }\n.blueprint > .corner.tr { top: -6px; right: -6px; }\n.blueprint > .corner.bl { bottom: -6px; left: -6px; }\n.blueprint > .corner.br { bottom: -6px; right: -6px; }\n\n.duotone{position:relative;overflow:hidden}\n.duotone::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background:var(--color-accent);mix-blend-mode:color}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: none;\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n/* — blueprint frame: components are wireframe objects (see .blueprint\n     and .corner above) — square, transparent, hairline-bordered — */\n.card, .btn, .input, .tag, .seg, .dialog { border-radius: 0; }\n.card, .dialog { background: transparent; border: 1px solid var(--color-divider); }\n.btn { border: 1px solid var(--color-divider); }\n.btn-primary { border-color: var(--color-accent); }\n.btn-ghost { border-color: transparent; }\n\n<\u002Fstyle>\n\n<style>\n/* Template scaffolding — page layout and web-scale sizing only; every color,\n   font, radius and shadow comes from ../../styles.css. The voice is the\n   deck's, re-derived for a scrolling page: an engineering document — Barlow\n   Condensed titles in uppercase over Barlow text, visible drawn structure\n   (1px caption rules; wireframe cells with registration-cross corners for\n   the feature cards — the system's own card grammar; a registration-marked\n   spec plate for the numbers), the steel accent as the single color,\n   photographs duotoned like screen prints.\n\n   THE RHYTHM: a 24px leading unit (16px Barlow body at 1.5 — the system's\n   0.85 density runs compact), 12px half-step; line-heights and block\n   margins in unit multiples, heads cap-trimmed, ?baselines/B to review.\n   The deck's seat-pinning relaxes to per-block discipline on a fluid page.\n   The system's own interface components keep their styles.css leading.\n\n   THE LANDING LAWS (shared by all six systems' landing templates):\n   #1 display headers break per sentence (.line spans); #2 the landing\n   advertises an invented product played straight — industry's is Holdfast,\n   a bolt-and-fastener catalog written like the datasheet it is; #3\n   spacing is cluster-scoped (display leading ratio-governed ≈1.04 for the\n   uppercase condensed — the display-block lattice exemption — tight\n   single-unit gaps inside a cluster, the air between sections); #4 no\n   hero eyebrow — the nav brand names the product.\n\n   Measured Barlow values carry verbatim from the deck template: optical\n   left alignment -0.052em where caps lead a condensed display line, quote\n   hang -0.316em (Condensed 600), attribution hang -0.885em (Regular). */\n:root {\n  --leading: 24px;\n  --half: 12px;\n  --edge: clamp(20px, 5vw, 72px);\n  --measure: 60ch;\n}\nhtml { scroll-behavior: smooth; }\n@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }\nbody { margin: 0; text-wrap: pretty; }\n.wrap { max-width: 1200px; margin: 0 auto; padding: 0 var(--edge); }\n/* the component demo pads the masthead with its own spacing; on the page the\n   masthead's contents take the page gutter and sit on the wrap's text axis\n   (padding-only — full-width paint such as a masthead rule is untouched) */\n.nav { padding-inline: max(var(--edge), calc((100% - 1200px) / 2 + var(--edge))); }\n.nav a { white-space: nowrap; }\n.nav a[aria-current='location'] { color: var(--color-accent-700); } /* in-page anchor,\n   not a page link — 'location' is the truthful value. The 700 step, not the\n   base accent: at 14px this is small text, where the base steel's 3.7:1\n   large-text value does not reach (5.8:1 measured — the same call broadsheet's\n   round 2 made, and the kickers already make here) */\n@media (max-width: 480px) { .nav a { display: none; } } /* phone width: the nav\n   keeps brand + the one action (layout-only — the component's look is untouched) */\n\n/* — caption rules (the deck's grammar: the label sits ABOVE a drawn 1px\n   rule and the content seats below it — structure made visible) — */\n.kicker {\n  display: block; font-size: 13px; line-height: var(--half);\n  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600;\n  color: var(--color-accent-700); /* accent-colored small text takes the deep\n     step — 5.8:1, where the base steel is a 3.7:1 large-text value */\n  font-feature-settings: \"tnum\" 1;\n  margin: 0 0 var(--half);\n}\n.caption-rule { height: 1px; border: 0; margin: 0 0 calc(var(--leading) - var(--half));\n  background: var(--color-divider); }\n\n/* — hero — */\n.hero { padding: calc(4 * var(--leading)) 0 calc(3 * var(--leading)); }\n.display {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: clamp(48px, 7vw, 96px);\n  line-height: clamp(50px, 7.3vw, 100px); /* law #3: ratio-governed ≈1.04, a\n     deliberate step below the lowercase systems' 1.06-1.11 band — uppercase\n     condensed carries no descenders to clear; the display-block lattice\n     exemption */\n  letter-spacing: 0.01em; text-transform: uppercase; margin: 0;\n  margin-left: -0.052em; /* optical left alignment — the deck's measured Condensed 600 value */\n  text-box: trim-both cap alphabetic;\n}\n.display .line { display: block; } /* law #1 */\n.hero .sub { font-size: 16px; line-height: var(--leading); max-width: var(--measure);\n  margin: calc(1.5 * var(--leading) - 1cap) 0 0;\n  text-box: trim-both cap alphabetic; }\n.hero .row { display: flex; gap: var(--space-3); flex-wrap: wrap; margin-top: var(--leading); }\n\n/* — the spec sheet (this system diverges from the shared stat-band chassis\n   here): where the chassis set four display numerals on a steel field,\n   Holdfast prints SHEET 01 of its own drawing set — a hairline-framed\n   plate with registration crosses (the frame every drawn object in this\n   system wears) carrying an engineering title block and the four product\n   claims as numbered datasheet rows. For a catalog \"written like the\n   datasheet it is\", tabulated data is the native grammar for numbers.\n   The steel ground leaves the page with the band — the deck's dividers\n   keep theirs, and the solid accent button returns to being the one\n   solid object on the board. Downstream sections number themselves into\n   the set with the deck's own kicker grammar (\"02 · \").\n\n   Rhythm: the title block is a 2-unit band (24px line + half-step padding\n   each side, wrap-safe); header row 1.5 units, data rows 2 units, text\n   centered on its band (the documented optical row-centering exception —\n   no cap trim inside row bands, so the authored line boxes carry the\n   math); the plate's internal rules land on the band seams. Figures in\n   the table are COLUMNS and take tabular figures per the deck's figure\n   policy — the display-numeral proportional exception retired with the\n   stat band. The downstream kickers number into the set with the deck's\n   bare \"NN · \" grammar while only the plate says the word \"Sheet\" — the\n   linkage is deliberately soft; the sections read as numbered notes\n   around the one drawn sheet, not as four dressed plates. — */\n.sheet { padding: calc(3 * var(--leading)) 0 calc(2.5 * var(--leading)); }\n.plate { position: relative; border: 1px solid var(--color-divider); }\n.plate > .corner { position: absolute; width: 15px; height: 15px;\n  color: color-mix(in srgb, var(--color-text) 55%, transparent); pointer-events: none; }\n.plate > .corner::before { content: \"\"; position: absolute; left: 7px; top: 0; width: 1px; height: 100%; background: currentColor; }\n.plate > .corner::after  { content: \"\"; position: absolute; top: 7px; left: 0; width: 100%; height: 1px; background: currentColor; }\n.plate > .corner.tl { top: -8px; left: -8px; }\n.plate > .corner.tr { top: -8px; right: -8px; }\n.plate > .corner.bl { bottom: -8px; left: -8px; }\n.plate > .corner.br { bottom: -8px; right: -8px; }\n/* the title block — the drawing's own naming furniture: a flexing title\n   cell, then register cells (doc, revision, sheet count) divided by\n   hairlines, all at the kicker's scale. The title prints in full text\n   ink — it is the section's heading; the register cells take 70% ink,\n   5.8:1 measured on this ground, where the system's 55% furniture\n   convention is a large-text value (3.6:1) */\n.title-block { display: flex; flex-wrap: wrap; align-items: stretch;\n  border-bottom: 1px solid var(--color-divider); }\n.title-block > span { padding: var(--half) var(--leading);\n  font-size: 13px; line-height: var(--leading); letter-spacing: 0.08em;\n  text-transform: uppercase; font-weight: 600; font-feature-settings: \"tnum\" 1; }\n.tb-title { flex: 1; min-width: 16ch; }\n.tb-cell { border-left: 1px solid var(--color-divider); white-space: nowrap;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent); }\n/* the spec table — the system's own .table component at landing scale (the\n   deck resizes it the same way). The № column takes the deep accent step,\n   the same call as the kickers (5.8:1 at 13px, where the base steel's\n   3.7:1 is a large-text value); values set in the condensed face at the\n   cell-heading scale, so the numbers stay the section's loudest objects */\n.spec { table-layout: fixed; }\n.spec col.c-num { width: calc(3 * var(--leading)); }\n.spec col.c-prop { width: 30%; }\n.spec col.c-val { width: 21%; }\n.spec th, .spec td { padding: var(--half) var(--leading) var(--half) 0; vertical-align: middle; }\n.spec th:first-child, .spec td:first-child { padding-left: var(--leading); }\n.spec th { font-size: 13px; line-height: var(--half); font-weight: 600; /* the\n     section's furniture weight — otherwise the UA's default th bold makes\n     the header row the sheet's only 700, by accident rather than decision */\n  color: color-mix(in srgb, var(--color-text) 70%, transparent); /* the component's\n     11px/60% header re-derived for the landing: 13px is still small text,\n     where 70% measures 5.8:1 and 60% falls short of 4.5:1 */ }\n.spec td { font-size: 15px; line-height: var(--leading); }\n.spec .s-num { font-size: 13px; font-weight: 600; letter-spacing: 0.08em;\n  color: var(--color-accent-700); font-feature-settings: \"tnum\" 1; }\n.spec .s-val { font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 22px; line-height: var(--leading); letter-spacing: 0.02em;\n  font-feature-settings: \"tnum\" 1; white-space: nowrap; }\n.spec .s-rem { color: color-mix(in srgb, var(--color-text) 78%, transparent); }\n.spec tbody tr:last-child td { border-bottom: 0; } /* the notes rule closes the\n   rows — avoid a doubled line against .sheet-note's divider */\n.spec tbody tr:hover { background: none; } /* a printed sheet, not an\n   interactive grid */\n.sheet-note { margin: 0; padding: var(--half) var(--leading);\n  border-top: 1px solid var(--color-divider);\n  font-size: 13px; line-height: var(--leading);\n  color: color-mix(in srgb, var(--color-text) 70%, transparent); /* 5.8:1 — see .spec th */ }\n\n/* — wireframe feature cells (the system's OWN card grammar: square,\n   thin-bordered, registration-cross corners, no surface fill) — */\n.features { padding: calc(3 * var(--leading)) 0 calc(2.5 * var(--leading)); }\n.features > .caption-rule { margin-bottom: calc(var(--leading) + 8px); } /* the cells'\n   registration crosses hang 8px above the frame's padding edge (7px of ink\n   past the 1px border) — a drawn rule keeps one full unit of air to the\n   nearest ink, so the rule clears the cross ink by 25px, not a sliver */\n.cells { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(20px, 3vw, 48px);\n  margin-top: calc(var(--leading) - var(--half)); }\n.cell-frame { position: relative; border: 1px solid var(--color-divider);\n  padding: var(--leading); } /* one full unit on every side — the cap-trimmed\n     heading seats with the same air above it as the text keeps to the frame's\n     left and right */\n.cell-frame > .corner { position: absolute; width: 15px; height: 15px;\n  color: color-mix(in srgb, var(--color-text) 55%, transparent); pointer-events: none; }\n.cell-frame > .corner::before { content: \"\"; position: absolute; left: 7px; top: 0; width: 1px; height: 100%; background: currentColor; }\n.cell-frame > .corner::after  { content: \"\"; position: absolute; top: 7px; left: 0; width: 100%; height: 1px; background: currentColor; }\n.cell-frame > .corner.tl { top: -8px; left: -8px; }\n.cell-frame > .corner.tr { top: -8px; right: -8px; }\n.cell-frame > .corner.bl { bottom: -8px; left: -8px; }\n.cell-frame > .corner.br { bottom: -8px; right: -8px; }\n.cell-frame h2 { font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 22px; line-height: var(--leading); letter-spacing: 0.02em; text-transform: uppercase;\n  margin: 0; text-box: trim-both cap alphabetic; }\n.cell-frame p { font-size: 15px; line-height: var(--leading); margin: calc(var(--leading) - 1cap) 0 0;\n  color: color-mix(in srgb, var(--color-text) 78%, transparent);\n  text-box: trim-both cap alphabetic; }\n\n/* — imagery split (the duotone screen print inside a wireframe frame —\n   the figure takes the same marked treatment as every framed object) — */\n.split { display: grid; grid-template-columns: minmax(0, 5fr) minmax(0, 7fr);\n  gap: var(--leading) clamp(24px, 5vw, 96px); align-items: center;\n  padding: calc(2 * var(--leading)) 0 calc(3 * var(--leading)); }\n.split-title { font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 32px; line-height: calc(1.5 * var(--leading)); letter-spacing: 0.02em; text-transform: uppercase;\n  margin: 0; text-box: trim-both cap alphabetic; }\n.split-copy .note { font-size: 15px; line-height: var(--leading);\n  color: color-mix(in srgb, var(--color-text) 78%, transparent);\n  margin: calc(var(--leading) - 1cap) 0 0; max-width: 48ch; text-box: trim-both cap alphabetic; }\n.split-figure { margin: 0; } /* .blueprint owns the frame: position, the 1px\n     border, and — critically — the overflow exemption that lets the\n     registration crosses live outside the box (.blueprint.duotone\n     { overflow: visible } in styles.css; a bare .duotone clips them) */\n.split-figure > .corner { position: absolute; width: 15px; height: 15px;\n  color: color-mix(in srgb, var(--color-text) 55%, transparent); pointer-events: none; /* the\n     registration crosses overlap the slot by a few px — decorative marks\n     must not eat its hover/drop events (image-slot usage contract) */ }\n.split-figure > .corner::before { content: \"\"; position: absolute; left: 7px; top: 0; width: 1px; height: 100%; background: currentColor; }\n.split-figure > .corner::after  { content: \"\"; position: absolute; top: 7px; left: 0; width: 100%; height: 1px; background: currentColor; }\n.split-figure > .corner.tl { top: -8px; left: -8px; }\n.split-figure > .corner.tr { top: -8px; right: -8px; }\n.split-figure > .corner.bl { bottom: -8px; left: -8px; }\n.split-figure > .corner.br { bottom: -8px; right: -8px; }\n.split-figure image-slot { width: 100%; aspect-ratio: 1600 / 1187; } /* the bundled\n   photograph's natural ratio pins the box, so a swapped image cover-crops\n   into the same frame (cover framing is the component's own) */\n\n/* — quote (condensed, uppercase-free — the one lowercase condensed moment;\n   hangs at the deck's measured advances) — */\n.quote { padding: calc(2.5 * var(--leading)) 0 calc(3.5 * var(--leading)); }\n.quote blockquote {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: clamp(26px, 2.8vw, 36px); line-height: calc(1.5 * var(--leading));\n  letter-spacing: 0; max-width: 36ch; margin: 0;\n  text-indent: -0.316em; /* hang the opening “ (the deck's measured advance in the Condensed 600) */\n  text-box: trim-both cap alphabetic;\n}\n.quote figcaption { font-size: 15px; line-height: var(--leading);\n  color: color-mix(in srgb, var(--color-text) 70%, transparent); /* small-text ink on the\n     paper ground: 70% measures 5.8:1 (55% is a large-text value here — 3.6:1) */\n  margin: calc(2 * var(--leading) - 1cap) 0 0; /* two grid units below the quote's\n     last baseline — one reads as part of the quote block; the attribution needs air */\n  text-indent: -0.885em; /* hang the leading em-dash + space (measured in Barlow Regular) */\n  text-box: trim-both cap alphabetic; }\n\n@media (max-width: 720px) {\n  /* the phone gutter (--edge bottoms out at 20px) is narrower than the hung\n     marks' measured advances, so a hung “ or em-dash would press into or past\n     the viewport edge — seat the quote flush below this width; the hang\n     returns with the wider gutter */\n  .quote blockquote, .quote figcaption { text-indent: 0; }\n}\n\n/* — close (paper, a caption rule above; the primary is the system's solid\n   accent action — everything else stays a line drawing) — */\n.close { padding: calc(2.5 * var(--leading)) 0 calc(2 * var(--leading)); }\n.close h3 { font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 24px; line-height: var(--leading); letter-spacing: 0.02em; text-transform: uppercase;\n  margin: 0; text-box: trim-both cap alphabetic; }\n.close .sub { font-size: 15px; line-height: var(--leading);\n  color: color-mix(in srgb, var(--color-text) 78%, transparent);\n  margin: calc(var(--leading) - 1cap) 0 0; max-width: var(--measure); text-box: trim-both cap alphabetic; }\n.signup { display: flex; gap: var(--space-3); align-items: stretch; max-width: 480px;\n  margin-top: var(--leading); }\n.signup .input { flex: 1; }\n.signup .input, .signup .btn { min-height: 36px; } /* one control height floor; the row\n  stretches, so whichever of the pair is taller sets both and they read as one row */\nfooter { padding: calc(2 * var(--leading)) 0; font-size: 13px; line-height: var(--leading);\n  color: color-mix(in srgb, var(--color-text) 70%, transparent); /* 5.8:1 — see .quote figcaption */ }\n\n/* — responsive collapse — */\n@media (max-width: 880px) {\n  .cells { grid-template-columns: 1fr; gap: calc(var(--leading) + 16px); } /* stacked\n     frames: both cells' crosses overhang 7px of ink into the gap, so the\n     clamp's 20px floor left 6px cross-to-cross — a 40px gap keeps a full\n     unit of air (26px) between the facing crosses */\n}\n@media (max-width: 720px) {\n  .hero { padding-top: calc(2.5 * var(--leading)); }\n  /* the sheet re-stacks: the title block drops its register cells to a\n     second ruled row, and each table row becomes its own small plate —\n     № and property on the register line, the value beneath, the remark\n     last. (Linearizing the table trades its grid semantics for reading\n     order; the row order is unchanged.) */\n  .tb-title { flex-basis: 100%; border-bottom: 1px solid var(--color-divider); }\n  .title-block > .tb-cell { padding-inline: var(--half); flex: 1 0 auto; } /* beats the\n     base span padding's specificity; the cells flex to close the register\n     row against the frame. (All title-block children are spans, so\n     :first-of-type can never name a register cell — the sibling selector\n     below is the one that works) */\n  .tb-title + .tb-cell { border-left: 0; padding-left: var(--leading); } /* first register\n     cell: its hairline would double the plate's own left border */\n  .spec thead { position: absolute; width: 1px; height: 1px; overflow: hidden;\n    clip-path: inset(50%); white-space: nowrap; } /* visually hidden, not\n     display:none — the stacked rows carry their own register (№ + property),\n     so the column heads are redundant on screen, but they stay in the\n     accessibility tree for readers that still expose the table semantics */\n  .spec, .spec tbody, .spec td { display: block; }\n  .spec tr { display: grid; grid-template-columns: max-content 1fr;\n    column-gap: var(--half); row-gap: var(--half); align-items: baseline;\n    padding: var(--leading);\n    border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent); }\n  .spec tr:last-child { border-bottom: 0; }\n  .spec th, .spec td { padding: 0; border: 0; }\n  .spec th:first-child, .spec td:first-child { padding-left: 0; } /* matches the\n     desktop rule's specificity, or the № keeps its 24px inset and floats\n     off the stacked rows' shared axis */\n  .spec .s-num { grid-column: 1; }\n  .spec .s-prop { grid-column: 2; }\n  .spec .s-val, .spec .s-rem { grid-column: 1 / -1; }\n  .spec .s-blank { display: none; } /* the desktop table's \"no remark\" dash\n     would dangle as a stray mark in the stacked row */\n  .split { grid-template-columns: 1fr; }\n  .split-figure { order: -1; }\n}\n@media (max-width: 360px) {\n  /* the narrowest screens: one register row no longer fits, so the title\n     block re-forms dding-top: var(--leading); display: flex; flex-direction: column; gap: var(--half); }\n.agent-cta .btn { width: 100%; box-sizing: border-box; text-align: center; justify-content: center; }\n/* the how-to panel: a drawn drawer under the button (native <details>) */\n.howto { border: 1px solid var(--color-divider); }\n.howto summary { list-style: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between;\n  gap: var(--half); padding: var(--half); font-size: 12px; line-height: var(--leading);\n  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; color: var(--color-accent-700); }\n.howto summary::-webkit-details-marker { display: none; }\n.howto summary::after { content: \"+\"; font-family: var(--font-heading); font-size: 18px; line-height: 1; color: var(--color-accent-700); }\n.howto[open] summary::after { content: \"−\"; }\n.howto summary:hover { background: color-mix(in srgb, var(--color-accent) 8%, transparent); }\n.howto-body { padding: 0 var(--half) var(--half); border-top: 1px solid var(--color-divider); }\n.howto-body ol { margin: var(--half) 0 0; padding-left: 20px; font-size: 14px; line-height: 21px;\n  color: color-mix(in srgb, var(--color-text) 78%, transparent); }\n.howto-body ol li + li { margin-top: 6px; }\n.howto-body p { margin: var(--half) 0 0; font-size: 13px; line-height: 18px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent); }\n.howto-body a { color: var(--color-accent-700); }\n\n/* — the trades (ruled rows: trade name in the condensed face, one blunt line) — */\n.trades { padding: calc(2 * var(--leading)) 0 calc(2.5 * var(--leading)); }\n.trade { display: grid; grid-template-columns: minmax(16ch, 3fr) 7fr;\n  gap: var(--half) var(--leading); padding: var(--leading) 0;\n  border-bottom: 1px solid var(--color-divider); align-items: baseline; }\n.trade h3 { font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 22px; line-height: var(--leading); letter-spacing: 0.02em;\n  text-transform: uppercase; margin: 0; }\n.trade p { margin: 0; font-size: 15px; line-height: var(--leading);\n  color: color-mix(in srgb, var(--color-text) 78%, transparent); }\n@media (max-width: 720px) { .trade { grid-template-columns: 1fr; } }\n\n.close .row { display: flex; gap: var(--space-3); flex-wrap: wrap; margin-top: var(--leading); }\n\n/* Review aid: the 24px rhythm drawn as hairlines — debug chrome, toggled by\n   ?baselines or the B key, never part of the look. */\nbody[data-baselines] { position: relative; }\nbody[data-baselines]::after {\n  content: \"\"; position: absolute; inset: 0; pointer-events: none;\n  background:\n    repeating-linear-gradient(to bottom,\n      color-mix(in srgb, var(--color-accent) 35%, transparent) 0 1px,\n      transparent 1px var(--leading)),\n    repeating-linear-gradient(to bottom,\n      transparent 0 var(--half),\n      color-mix(in srgb, var(--color-accent) 16%, transparent) var(--half) calc(var(--half) + 1px),\n      transparent calc(var(--half) + 1px) var(--leading));\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<nav class=\"nav\">\n  <span class=\"nav-brand\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" aria-hidden=\"true\"><rect x=\"1.5\" y=\"1.5\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Frect><path d=\"M6 14.5 L10 5 L14 14.5 M7.4 11.4 H12.6\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"square\"><\u002Fpath><\u002Fsvg>AgentiA Québec<\u002Fspan>\n  <a href=\"#agents\" aria-current=\"location\">Les agents<\u002Fa>\n  <a href=\"#offre\">L’offre<\u002Fa>\n  <a href=\"#metiers\">Pour qui<\u002Fa>\n  <a class=\"btn btn-primary\" href=\"#demarrer\">1 mois gratuit<\u002Fa>\n<\u002Fnav>\n<div class=\"wrap\">\n\n  <section class=\"hero\">\n    <h1 class=\"display\"><span class=\"line\">Reste sur le chantier.<\u002Fspan> <span class=\"line\">Le bureau, c’est réglé.<\u002Fspan><\u002Fh1>\n    <p class=\"sub\">Quatre agents IA — Emily, Sarah, Julie et Sandra — répondent à tes appels, classent tes factures, montent tes rapports comptables et sortent tes soumissions. Toi, tu poses, tu coules, tu câbles. Premier mois gratuit, garanti, sans frais — pis aucun engagement&nbsp;: t’arrêtes quand tu veux.<\u002Fp>\n    <div class=\"row\">\n      <a class=\"btn btn-primary\" href=\"https://wa.me/15813337317?text=(Efface%20ce%20texte%20avant%20de%20tester%20%E2%80%94%20rien%20%C3%A0%20envoyer%20par%20%C3%A9crit)%20Pour%20tester%20Emily%20%3A%20appuie%20sur%20l%E2%80%99ic%C3%B4ne%20d%E2%80%99appel%20en%20haut%20de%20la%20conversation%2C%20pis%20parle-lui%20comme%20si%20t%E2%80%99%C3%A9tais%20un%20client%20qui%20appelle%20apr%C3%A8s%20avoir%20vu%20une%20pub.\" target=\"_blank\" rel=\"noopener\">Appelle Emily sur WhatsApp — 581 333-7317<\u002Fa>\n      <a class=\"btn btn-ghost\" href=\"#demarrer\">Réserve un appel<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"sheet\" id=\"offre\" aria-label=\"AgentiA — conditions de l’offre\">\n    <div class=\"plate\">\n      <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n      <header class=\"title-block\">\n        <span class=\"tb-title\">AgentiA — conditions de l’offre<\u002Fspan>\n        <span class=\"tb-cell\">AQ-2026<\u002Fspan>\n        <span class=\"tb-cell\">Rév. A<\u002Fspan>\n        <span class=\"tb-cell\">Feuille 01 de 05<\u002Fspan>\n      <\u002Fheader>\n      <table class=\"table spec\">\n        <colgroup><col class=\"c-num\"><col class=\"c-prop\"><col class=\"c-val\"><col class=\"c-rem\"><\u002Fcolgroup>\n        <thead>\n          <tr><th scope=\"col\">№<\u002Fth><th scope=\"col\">Élément<\u002Fth><th scope=\"col\">Valeur<\u002Fth><th scope=\"col\">Remarque<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr><td class=\"s-num\">01<\u002Ftd><td class=\"s-prop\">Agents au catalogue<\u002Ftd><td class=\"s-val\">4<\u002Ftd><td class=\"s-rem\">Emily · Sarah · Julie · Sandra<\u002Ftd><\u002Ftr>\n          <tr><td class=\"s-num\">02<\u002Ftd><td class=\"s-prop\">Installation<\u002Ftd><td class=\"s-val\">2 000 $<\u002Ftd><td class=\"s-rem\">Une fois — intégration en 1 semaine<\u002Ftd><\u002Ftr>\n          <tr><td class=\"s-num\">03<\u002Ftd><td class=\"s-prop\">Abonnement<\u002Ftd><td class=\"s-val\">300 $/mois<\u002Ftd><td class=\"s-rem\">Par agent actif<\u002Ftd><\u002Ftr>\n          <tr><td class=\"s-num\">04<\u002Ftd><td class=\"s-prop\">Premier mois<\u002Ftd><td class=\"s-val\">0 $<\u002Ftd><td class=\"s-rem\">Garanti, dès la fin de l’intégration<\u002Ftd><\u002Ftr>\n          <tr><td class=\"s-num\">05<\u002Ftd><td class=\"s-prop\">Référence<\u002Ftd><td class=\"s-val\">−100 $/mois<\u002Ftd><td class=\"s-rem\">Pendant 10 mois, après ton mois gratuit<\u002Ftd><\u002Ftr>\n          <tr><td class=\"s-num\">06<\u002Ftd><td class=\"s-prop\">Engagement à long terme<\u002Ftd><td class=\"s-val\">Aucun<\u002Ftd><td class=\"s-rem\">Tu peux arrêter en tout temps, sans pénalité<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n      <p class=\"sheet-note\">Prix en dollars canadiens. Le mois gratuit part quand l’intégration est terminée — pas avant.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"agents\" id=\"agents\">\n    <span class=\"kicker\">02 · L’équipe de bureau<\u002Fspan>\n    <hr class=\"caption-rule\">\n    <div class=\"agents-grid\">\n      <div class=\"cell-frame\">\n        <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <figure class=\"agent-portrait blueprint duotone\">\n          <image-slot id=\"portrait-emily\" shape=\"rect\" src=\"79a9fc2f-48b5-416c-a8af-65c5c02aaada\" placeholder=\"Portrait cartoon d’Emily (casque d’écoute)\" role=\"img\" aria-label=\"Emily, agente de réception d’appels\"><\u002Fimage-slot>\n          <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <\u002Ffigure>\n        <span class=\"agent-role\">Agent 01 · Appels entrants<\u002Fspan>\n        <h2>Emily<\u002Fh2>\n        <p>Tes clients voient ta pub sur Google, Facebook ou Instagram pis ils appellent&nbsp;: Emily répond, pose les bonnes questions pis préqualifie chaque client dans ton Google&nbsp;Sheet. Toi, tu rappelles juste ceux qui valent la peine.<\u002Fp>\n        <div class=\"agent-cta\">\n          <a class=\"btn btn-primary\" href=\"https://wa.me/15813337317?text=(Efface%20ce%20texte%20avant%20de%20tester%20%E2%80%94%20rien%20%C3%A0%20envoyer%20par%20%C3%A9crit)%20Pour%20tester%20Emily%20%3A%20appuie%20sur%20l%E2%80%99ic%C3%B4ne%20d%E2%80%99appel%20en%20haut%20de%20la%20conversation%2C%20pis%20parle-lui%20comme%20si%20t%E2%80%99%C3%A9tais%20un%20client%20qui%20appelle%20apr%C3%A8s%20avoir%20vu%20une%20pub.\" target=\"_blank\" rel=\"noopener\">Teste Emily — appelle-la sur WhatsApp<\u002Fa>\n          <details class=\"howto\">\n            <summary>Comment tester Emily<\u002Fsummary>\n            <div class=\"howto-body\">\n              <ol>\n                <li>Le bouton ouvre WhatsApp (ordi ou mobile) sur la conversation d’Emily, avec un petit rappel des étapes dans la barre de texte — efface-le, y a rien à envoyer par écrit. Pas de WhatsApp&nbsp;? Le lien va te proposer de l’installer.<\u002Fli>\n                <li>Appuie sur l’icône d’appel en haut de la conversation.<\u002Fli>\n                <li>Mets-toi dans la peau d’un de tes clients qui appelle après avoir vu ta pub&nbsp;: Emily répond, pose ses questions pis préqualifie la demande.<\u002Fli>\n                <li>Tout ce qu’elle collecte tombe dans un Google&nbsp;Sheet — prêt pour ton rappel.<\u002Fli>\n              <\u002Fol>\n              <p>L’accès au <a href=\"https://docs.google.com/spreadsheets/d/1gp3__Q6uFn7psn9-wVIfy7gcYjTTMuQzkBUa4flRpiI/edit?usp=sharing\" target=\"_blank\" rel=\"noopener\">Google&nbsp;Sheet des résultats<\u002Fa> se donne pendant la rencontre avec un spécialiste IA.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell-frame\">\n        <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <figure class=\"agent-portrait blueprint duotone\">\n          <image-slot id=\"portrait-sarah\" shape=\"rect\" src=\"58041ad5-c233-4f9b-89c2-0dcc4ce5e1cd\" placeholder=\"Portrait cartoon de Sarah (reçus en main)\" role=\"img\" aria-label=\"Sarah, commis comptable\"><\u002Fimage-slot>\n          <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <\u002Ffigure>\n        <span class=\"agent-role\">Agent 02 · Commis comptable<\u002Fspan>\n        <h2>Sarah<\u002Fh2>\n        <p>Envoie-lui une photo de facture sur WhatsApp ou un PDF de la banque. Elle transcrit tout dans un Google&nbsp;Sheet propre. Fini la boîte à chaussures de reçus.<\u002Fp>\n        <div class=\"agent-cta\">\n          <a class=\"btn btn-primary\" href=\"https://wa.me/15813337317?text=(Efface%20ce%20texte%20avant%20d%E2%80%99envoyer)%20Pour%20tester%20Sarah%20%3A%20envoie%20directement%20une%20photo%20de%20facture%20ou%20un%20PDF%20de%20relev%C3%A9%20bancaire%20avec%20le%20trombone%20(pi%C3%A8ce%20jointe).%20Rien%20%C3%A0%20%C3%A9crire.\" target=\"_blank\" rel=\"noopener\">Teste Sarah — envoie une facture<\u002Fa>\n          <details class=\"howto\">\n            <summary>Comment tester Sarah<\u002Fsummary>\n            <div class=\"howto-body\">\n              <ol>\n                <li>Le bouton ouvre WhatsApp sur la conversation de Sarah, avec un rappel des étapes dans la barre de texte — efface-le avant d’envoyer.<\u002Fli>\n                <li>Pas besoin d’écrire&nbsp;: appuie sur le trombone (pièce jointe) pis envoie directement une photo de facture ou un PDF de relevé bancaire.<\u002Fli>\n                <li>Sarah transcrit tout dans un Google&nbsp;Sheet propre — fournisseur, montant, date, taxes.<\u002Fli>\n              <\u002Fol>\n              <p>L’accès au <a href=\"https://docs.google.com/spreadsheets/d/1gp3__Q6uFn7psn9-wVIfy7gcYjTTMuQzkBUa4flRpiI/edit?usp=sharing\" target=\"_blank\" rel=\"noopener\">Google&nbsp;Sheet des résultats<\u002Fa> se donne pendant la rencontre avec un spécialiste IA.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell-frame\">\n        <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <figure class=\"agent-portrait blueprint duotone\">\n          <image-slot id=\"portrait-julie\" shape=\"rect\" src=\"4d7cc232-59f9-4f06-8121-deae51f09fbb\" placeholder=\"Portrait cartoon de Julie (lunettes, rapports)\" role=\"img\" aria-label=\"Julie, agente CPA\"><\u002Fimage-slot>\n          <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <\u002Ffigure>\n        <span class=\"agent-role\">Agent 03 · CPA<\u002Fspan>\n        <h2>Julie<\u002Fh2>\n        <p>Elle prend les chiffres de Sarah et en sort des rapports clairs&nbsp;: où va l’argent, qu’est-ce qui traîne. Elle monte aussi un rapport comptable complet pour vérifier celui de ton comptable humain.<\u002Fp>\n        <div class=\"agent-cta\">\n          <a class=\"btn btn-primary\" href=\"https://calendar.google.com/calendar/u/7/r?pli=1\" target=\"_blank\" rel=\"noopener\">Julie — prends RV avec un spécialiste<\u002Fa>\n          <details class=\"howto\">\n            <summary>Pourquoi pas de test direct&nbsp;?<\u002Fsummary>\n            <div class=\"howto-body\">\n              <ol>\n                <li>Julie est une agente de haut niveau&nbsp;: elle travaille avec tes vraies données comptables, pas avec des exemples.<\u002Fli>\n                <li>Un spécialiste IA te montre son travail en rencontre (Google&nbsp;Meet) et te donne l’accès à ce moment-là.<\u002Fli>\n                <li>Le bouton ouvre le calendrier pour réserver ta rencontre.<\u002Fli>\n              <\u002Fol>\n              <p>Ses rapports se livrent dans un <a href=\"https://docs.google.com/spreadsheets/d/1gp3__Q6uFn7psn9-wVIfy7gcYjTTMuQzkBUa4flRpiI/edit?usp=sharing\" target=\"_blank\" rel=\"noopener\">Google&nbsp;Sheet<\u002Fa> partagé pendant la rencontre.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cell-frame\">\n        <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <figure class=\"agent-portrait blueprint duotone\">\n          <image-slot id=\"portrait-sandra\" shape=\"rect\" src=\"b286113a-5b62-444b-b8c9-a458af5ef9f3\" placeholder=\"Portrait cartoon de Sandra (micro, soumission)\" role=\"img\" aria-label=\"Sandra, agente aux soumissions\"><\u002Fimage-slot>\n          <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n        <\u002Ffigure>\n        <span class=\"agent-role\">Agent 04 · Soumissions<\u002Fspan>\n        <h2>Sandra<\u002Fh2>\n        <p>Dicte-lui les infos du chantier en vocal sur WhatsApp. Elle te sort une soumission propre pour ton client avant que t’aies fini ton café.<\u002Fp>\n        <div class=\"agent-cta\">\n          <a class=\"btn btn-primary\" href=\"https://wa.me/15813337317?text=(Efface%20ce%20texte%20avant%20d%E2%80%99envoyer)%20Pour%20tester%20Sandra%20%3A%20tiens%20le%20micro%20pis%20laisse%20un%20vocal%20avec%20les%20specs%20de%20ton%20projet.%20Rien%20%C3%A0%20%C3%A9crire.\" target=\"_blank\" rel=\"noopener\">Teste Sandra — laisse-lui un vocal<\u002Fa>\n          <details class=\"howto\">\n            <summary>Comment tester Sandra<\u002Fsummary>\n            <div class=\"howto-body\">\n              <ol>\n                <li>Le bouton ouvre WhatsApp sur la conversation de Sandra, avec un rappel des étapes dans la barre de texte — efface-le avant d’envoyer.<\u002Fli>\n                <li>Rien à écrire&nbsp;: tiens le micro pis laisse directement un vocal avec les specs du projet — fictives ou vraies&nbsp;: client, surface, matériaux, délais.<\u002Fli>\n                <li>Sandra monte la soumission à partir de ton vocal.<\u002Fli>\n              <\u002Fol>\n              <p>L’accès au <a href=\"https://docs.google.com/spreadsheets/d/1I5ZrR9sdAQ9FdpgvFlI3J-06C0CXsRgmKhUSuINR3XQ/edit?usp=sharing\" target=\"_blank\" rel=\"noopener\">Google&nbsp;Sheet de Sandra<\u002Fa> se donne pendant la rencontre avec un spécialiste IA.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"split\" id=\"histoire\">\n    <div class=\"split-copy\">\n      <span class=\"kicker\">03 · Le gars pour qui on a bâti ça<\u002Fspan>\n      <hr class=\"caption-rule\">\n      <h2 class=\"split-title\">Marc, 30 ans, entrepreneur général<\u002Fh2>\n      <p class=\"note\">Trop de contrats, pas assez de soirées. Le jour, il bâtit. Le soir, il classait des factures, rappelait des numéros manqués pis montait des soumissions à 23&nbsp;h.<\u002Fp>\n      <p class=\"note\">Aujourd’hui&nbsp;: Emily répond, Sarah classe, Julie compte, Sandra soumissionne. Marc, lui, est sur le chantier — le téléphone reste dans le camion.<\u002Fp>\n    <\u002Fdiv>\n    <figure class=\"split-figure blueprint duotone\">\n      <image-slot id=\"photo-marc\" shape=\"rect\" src=\"590cac5d-cec8-494a-ab64-c606515a8cb3\" placeholder=\"Photo&nbsp;: Marc enterré dans la paperasse, le soir, après le chantier\" role=\"img\" aria-label=\"Un entrepreneur général enseveli sous la paperasse du bureau\"><\u002Fimage-slot>\n      <i class=\"corner tl\"><\u002Fi><i class=\"corner tr\"><\u002Fi><i class=\"corner bl\"><\u002Fi><i class=\"corner br\"><\u002Fi>\n    <\u002Ffigure>\n  <\u002Fsection>\n\n  <section class=\"trades\" id=\"metiers\">\n    <span class=\"kicker\">04 · Pour qui<\u002Fspan>\n    <hr class=\"caption-rule\">\n    <div class=\"trade\"><h3>Plomberie<\u002Fh3><p>Les appels d’urgence rentrent pareil — Emily les qualifie pendant que t’as les mains dans un drain.<\u002Fp><\u002Fdiv>\n    <div class=\"trade\"><h3>Électricité<\u002Fh3><p>Sandra monte la soumission pendant que tu tires du fil.<\u002Fp><\u002Fdiv>\n    <div class=\"trade\"><h3>Construction &amp; réno<\u002Fh3><p>Sarah classe les factures de matériaux le jour même, pas au mois de mars.<\u002Fp><\u002Fdiv>\n    <div class=\"trade\"><h3>Design de maisons<\u002Fh3><p>Julie te dit ce que chaque projet rapporte vraiment — avant d’en signer un autre pareil.<\u002Fp><\u002Fdiv>\n    <div class=\"trade\"><h3>Autres métiers de service<\u002Fh3><p>Si ton bureau te suit dans le camion, on peut t’aider. Appelle, Emily va te le dire.<\u002Fp><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"quote\">\n    <figure>\n      <!-- keep the leading “ — the blockquote's negative text-indent hangs it in the margin -->\n      <blockquote>«&nbsp;Avant, je faisais ma comptabilité le dimanche soir. Là, je regarde la game. Les rapports sont déjà faits.&nbsp;»<\u002Fblockquote>\n      <!-- keep the leading \"— \" — the figcaption's negative text-indent hangs it -->\n      <figcaption>— Marc, le gars pour qui on a bâti ça<\u002Ffigcaption>\n    <\u002Ffigure>\n  <\u002Fsection>\n\n  <section class=\"close\" id=\"demarrer\">\n    <span class=\"kicker\">05 · Démarrer<\u002Fspan>\n    <hr class=\"caption-rule\">\n    <h3>Un mois gratuit. Aucun engagement. Sans niaisage.<\u002Fh3>\n    <p class=\"sub\">On installe tes agents en une semaine (2&nbsp;000&nbsp;$, une fois). Après, ton premier mois est gratuit — garanti, zéro frais, pis il t’engage à rien&nbsp;: t’es pas lié à long terme, tu peux arrêter en tout temps. Ensuite, c’est 300&nbsp;$ par mois par agent. Tu réfères un autre entrepreneur&nbsp;? 100&nbsp;$ de rabais par mois pendant 10&nbsp;mois, après ton mois gratuit.<\u002Fp>\n    <div class=\"row\">\n      <a class=\"btn btn-primary\" href=\"https://wa.me/15813337317?text=(Efface%20ce%20texte%20avant%20de%20tester%20%E2%80%94%20rien%20%C3%A0%20envoyer%20par%20%C3%A9crit)%20Pour%20tester%20Emily%20%3A%20appuie%20sur%20l%E2%80%99ic%C3%B4ne%20d%E2%80%99appel%20en%20haut%20de%20la%20conversation%2C%20pis%20parle-lui%20comme%20si%20t%E2%80%99%C3%A9tais%20un%20client%20qui%20appelle%20apr%C3%A8s%20avoir%20vu%20une%20pub.\" target=\"_blank\" rel=\"noopener\">Appelle Emily sur WhatsApp — 581 333-7317<\u002Fa>\n      <a class=\"btn btn-secondary\" href=\"https://calendar.google.com/calendar/u/7/r?pli=1\" target=\"_blank\" rel=\"noopener\">Réserve un appel au calendrier<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>AgentiA Québec — des agents IA qui aident les humains de métier, pas qui les remplacent. · 581 333-7317<\u002Ffooter>\n<\u002Fdiv>\n<script src=\"253d19ab-d786-452e-8207-0d463db307ea\"><\u002Fscript>\n<script>\n// Review aid: baseline-grid overlay — add ?baselines to the URL, or press B to toggle.\n(() => {\n  if (new URLSearchParams(location.search).has('baselines')) document.body.setAttribute('data-baselines', '');\n  addEventListener('keydown', (e) => {\n    const t = e.target;\n    if (t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return;\n    if ((e.key === 'b' || e.key === 'B') && !e.metaKey && !e.ctrlKey && !e.altKey) document.body.toggleAttribute('data-baselines');\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
